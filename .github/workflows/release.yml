name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npm run version:check
      - run: npm run validate
      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" artifacts/* --generate-notes --verify-tag --title "$GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ github.token }}
